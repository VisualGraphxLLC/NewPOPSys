<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Store Portal - Capture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../theme-config.js"></script>
    <script src="../theme-loader.js"></script>
    <style>
        /* Theme CSS Variables */
        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --primary-dark: #1d4ed8;
            --accent: #f59e0b;
        }

        [data-theme="shelfsync"] {
            --primary: #00ABB9;
            --primary-light: #14b8a6;
            --primary-dark: #012D3A;
            --accent: #FCD732;
        }

        body {
            background-color: #333;
            min-height: 100vh;
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .phone-container {
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        #phone {
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            border: 12px solid #1a1a1a;
            display: flex;
            flex-direction: column;
        }

        .camera-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 20px;
            z-index: 10;
            pointer-events: none;
        }

        .camera-controls {
            pointer-events: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-bottom: 20px;
        }

        .shutter-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 4px solid white;
            background: transparent;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .shutter-inner {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            transition: transform 0.1s;
        }

        .shutter-btn:active .shutter-inner {
            transform: scale(0.9);
        }

        .guideline-box {
            border: 2px dashed rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.1);
            margin: auto;
            width: 80%;
            height: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 20px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>
    <div class="phone-container">
        <div id="phone">
            <!-- Simulated Camera Feed Background -->
            <img src="https://images.unsplash.com/photo-1541888946425-d81bb19240f5?q=80&w=1000&auto=format&fit=crop"
                class="absolute inset-0 w-full h-full object-cover opacity-80" alt="Camera Feed">

            <!-- Overlay UI -->
            <div class="camera-overlay">
                <div class="flex justify-between items-start pointer-events-auto">
                    <button onclick="window.history.back()" class="p-2 bg-black/50 rounded-full text-white"><i
                            data-lucide="x" class="w-6 h-6"></i></button>
                    <div class="bg-black/50 px-3 py-1 rounded-full text-white text-xs font-medium">Front Windows (Left)
                    </div>
                    <button class="p-2 bg-black/50 rounded-full text-white"><i data-lucide="zap-off"
                            class="w-6 h-6"></i></button>
                </div>

                <div class="guideline-box">
                    <div>
                        <i data-lucide="scan-face" class="w-12 h-12 mx-auto mb-2 opacity-80"></i>
                        <p>Align window cling within frame</p>
                    </div>
                </div>

                <div class="camera-controls">
                    <button class="p-3 bg-black/50 rounded-full text-white"><i data-lucide="image"
                            class="w-6 h-6"></i></button>
                    <div class="shutter-btn" onclick="capturePhoto()">
                        <div class="shutter-inner"></div>
                    </div>
                    <button class="p-3 bg-black/50 rounded-full text-white"><i data-lucide="rotate-ccw"
                            class="w-6 h-6"></i></button>
                </div>
            </div>

            <!-- Review Overlay (Hidden by default) -->
            <div id="capture-review" class="absolute inset-0 bg-black z-20 flex flex-col hidden">
                <img id="captured-img" src="" class="flex-1 object-contain bg-black">
                <div class="h-24 bg-black flex justify-between items-center px-6">
                    <button onclick="retakePhoto()" class="text-white text-sm font-medium">Retake</button>
                    <button onclick="confirmPhoto()" class="text-blue-400 text-lg font-bold">Use Photo</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function capturePhoto() {
            const review = document.getElementById('capture-review');
            const img = document.getElementById('captured-img');
            // Simulate capture
            img.src = "https://images.unsplash.com/photo-1541888946425-d81bb19240f5?q=80&w=1000&auto=format&fit=crop";
            review.classList.remove('hidden');
        }

        function retakePhoto() {
            document.getElementById('capture-review').classList.add('hidden');
        }

        function confirmPhoto() {
            // Mock upload
            window.history.back();
        }
    </script>
</body>

</html>
