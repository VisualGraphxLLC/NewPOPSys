<svg viewBox="0 0 200 50" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Logo Icon with white background for visibility -->
    <rect width="42" height="42" x="4" y="4" rx="9" fill="white"/>
    <rect width="40" height="40" x="5" y="5" rx="8" fill="url(#shelfsync-grad-light)"/>
    <defs>
        <linearGradient id="shelfsync-grad-light" x1="0" y1="0" x2="40" y2="40">
            <stop stop-color="#012D3A"/>
            <stop offset="1" stop-color="#00ABB9"/>
        </linearGradient>
    </defs>
    <!-- Shelf lines -->
    <rect x="10" y="13" width="30" height="5" rx="1" fill="#FCD732"/>
    <rect x="10" y="20" width="30" height="5" rx="1" fill="white"/>
    <rect x="10" y="27" width="30" height="5" rx="1" fill="#FCD732"/>
    <!-- Sync circle -->
    <circle cx="35" cy="22" r="7" fill="white" stroke="#00ABB9" stroke-width="2"/>
    <path d="M32 22h6M35 19v6" stroke="#00ABB9" stroke-width="2" stroke-linecap="round"/>

    <!-- Text - Light version for dark backgrounds -->
    <text x="55" y="32" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="white">Shelf</text>
    <text x="110" y="32" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#FCD732">Sync</text>
</svg>
