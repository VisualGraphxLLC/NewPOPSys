<svg viewBox="0 0 200 50" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Logo Icon -->
    <rect width="40" height="40" x="5" y="5" rx="8" fill="url(#prism-grad)"/>
    <defs>
        <linearGradient id="prism-grad" x1="0" y1="0" x2="40" y2="40">
            <stop stop-color="#18181B"/>
            <stop offset="1" stop-color="#3F3F46"/>
        </linearGradient>
    </defs>
    <!-- Prism triangles -->
    <polygon points="25,8 40,36 10,36" fill="none" stroke="#14B8A6" stroke-width="2"/>
    <polygon points="25,18 33,32 17,32" fill="#14B8A6"/>

    <!-- Text -->
    <text x="55" y="32" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#18181B">PRI</text>
    <text x="92" y="32" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#14B8A6">SM</text>
</svg>
