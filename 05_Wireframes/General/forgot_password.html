<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POP System - Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../theme-config.js"></script>
    <script src="../theme-loader.js"></script>
    <style>
        .login-card {
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4 bg-cover bg-center"
    style="background-image: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), url('https://images.unsplash.com/photo-1557804506-669a67965ba0?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');">

    <!-- Theme Configuration Button (Top Right) -->
    <div class="fixed top-4 right-4 z-50">
        <button onclick="toggleThemeConfig()"
            class="bg-white/10 hover:bg-white/20 text-white p-2 rounded-full backdrop-blur-sm transition-colors"
            title="Theme Settings">
            <i data-lucide="palette" class="w-5 h-5"></i>
        </button>
    </div>

    <div class="max-w-md w-full">
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <img src="../logos/newpopsys-logo.svg" alt="POP System Logo" class="h-12">
        </div>

        <!-- Reset Card -->
        <div
            class="login-card bg-white rounded-2xl shadow-2xl p-8 relative overflow-hidden backdrop-blur-xl bg-white/95">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500">
            </div>

            <!-- Form State -->
            <div id="reset-form">
                <div class="mb-8 text-center">
                    <h2 class="text-2xl font-bold text-slate-800">Forgot Password?</h2>
                    <p class="text-slate-500 mt-2">Enter your email address and we'll send you a link to reset your
                        password.</p>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-3 top-3 w-5 h-5 text-slate-400"></i>
                            <input type="email" id="email-input"
                                class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                                placeholder="name@company.com">
                        </div>
                    </div>

                    <button onclick="handleReset()"
                        class="w-full bg-slate-900 text-white py-2.5 rounded-lg font-medium hover:bg-slate-800 transition-all flex items-center justify-center gap-2">
                        <span>Send Reset Link</span>
                        <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>

                    <div class="text-center">
                        <a href="login.html"
                            class="text-blue-600 hover:text-blue-700 font-medium text-sm flex items-center justify-center gap-1">
                            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Login
                        </a>
                    </div>
                </div>
            </div>

            <!-- Success State (Hidden) -->
            <div id="reset-success" class="hidden text-center py-4">
                <div
                    class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="mail-check" class="w-8 h-8"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-800 mb-2">Check your email</h3>
                <p class="text-slate-500 mb-6">We've sent a password reset link to <br><strong id="user-email"
                        class="text-slate-800">user@example.com</strong></p>

                <a href="login.html"
                    class="inline-block bg-slate-100 text-slate-700 px-6 py-2 rounded-lg font-medium hover:bg-slate-200 transition-colors">
                    Back to Login
                </a>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();

        function handleReset() {
            const email = document.getElementById('email-input').value;
            if (!email) {
                alert('Please enter your email address');
                return;
            }

            const btn = document.querySelector('button[onclick="handleReset()"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Sending...';
            lucide.createIcons();

            setTimeout(() => {
                document.getElementById('reset-form').classList.add('hidden');
                document.getElementById('reset-success').classList.remove('hidden');
                document.getElementById('user-email').textContent = email;
            }, 1000);
        }
    </script>
</body>

</html>
