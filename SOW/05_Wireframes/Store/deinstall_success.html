<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Store Portal - Success</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../theme-config.js"></script>
    <script src="../theme-loader.js"></script>
    <style>
        /* Theme CSS Variables */
        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --primary-dark: #1d4ed8;
            --accent: #f59e0b;
        }

        [data-theme="shelfsync"] {
            --primary: #00ABB9;
            --primary-light: #14b8a6;
            --primary-dark: #012D3A;
            --accent: #FCD732;
        }

        body {
            background-color: #333;
            min-height: 100vh;
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .phone-container {
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        #phone {
            width: 375px;
            height: 812px;
            background: #f3f4f6;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            border: 12px solid #1a1a1a;
            display: flex;
            flex-direction: column;
        }

        .safe-area-top {
            height: 44px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .screen {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 80px;
        }

        .btn-primary {
            background: #ea580c;
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            width: 100%;
            display: block;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="phone-container">
        <div id="phone">
            <div class="safe-area-top">
                <span>9:42</span>
                <div class="flex gap-1"><i data-lucide="wifi" size="14"></i><i data-lucide="battery" size="14"></i>
                </div>
            </div>

            <div id="screen-deinstall-success" class="screen">
                <div class="flex flex-col items-center justify-center min-h-[60vh] text-center">
                    <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-6">
                        <i data-lucide="check-circle" class="w-12 h-12 text-green-600"></i>
                    </div>
                    <h1 class="text-2xl font-bold mb-2">Deinstall Complete!</h1>
                    <p class="text-gray-500 mb-6">Campaign materials have been successfully removed and documented.</p>

                    <div class="bg-orange-50 border border-orange-200 rounded-lg p-4 mb-6 w-full max-w-sm">
                        <div class="font-bold text-orange-800 mb-2">Holiday Promo 2025</div>
                        <div class="text-sm text-orange-700">
                            <div class="flex justify-between mb-1"><span>Items Removed:</span><span
                                    class="font-medium">4</span></div>
                            <div class="flex justify-between mb-1"><span>Photos Uploaded:</span><span
                                    class="font-medium">4</span></div>
                            <div class="flex justify-between"><span>Completed:</span><span class="font-medium">Jan 2,
                                    2026</span></div>
                        </div>
                    </div>

                    <button onclick="window.location.href='task_list.html'" class="btn-primary">Return to Tasks</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
